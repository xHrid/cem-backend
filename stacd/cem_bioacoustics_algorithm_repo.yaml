# STACD Algorithm Repo — how each CEM bioacoustics algorithm is executed.
# Each node calls this docker's SYNCHRONOUS endpoint POST /api/v1/<algo>, which
# blocks until the step finishes and returns 200 + {asset_id, stac} (or
# 400/404/500 per the STACD response contract).
#
# Replace the host in every `url` with the docker's reachable address — the
# NGINX route in production, or the ngrok/tunnel URL while testing.
# (FastAPI tolerates a trailing slash; both /api/v1/birdnet and .../birdnet/ work.)

--- !Algorithm_Instance
type: BirdNET
version: "1"
assets:
  code: "https://github.com/xHrid/cem-scripts-new"
date: 2026-06-14 00:00:00
execution_modes:
  api:
    enabled: true
    priority: 1
    url: "http://cem-bioacoustics:8000/api/v1/birdnet"

