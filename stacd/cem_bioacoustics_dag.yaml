# STACD DAG definition — CEM bioacoustics workflow.
# Upload via STACD → Initialize Workflow (with the two repo YAMLs).
# birdnet runs first (audio -> aggregate); the six analyses consume the aggregate.
--- !DAG
id: cem_bioacoustics_dag
name: CEM Bioacoustics (BirdNET + ecological analyses)
version: 1.0
description: "BirdNET species detection over registered field audio, then six ecological analyses."
params:
  - spots                    # comma-separated spot names, or omit for all
  - start_date               # YYYYMMDD or YYYY-MM-DD
  - end_date                 # YYYYMMDD or YYYY-MM-DD
  - snr_db                   # BirdNET denoise SNR (dB), birdnet only
  - spots_geo                # optional JSON: [{"name","lat","lon"}] for STAC geometry
  # Per-step algorithm tunables (all optional; each read by exactly one node):
  - min_confidence           # BirdNET min detection confidence 0-1 (birdnet)
  - top_n_species            # top N species to plot (heatmaps)
  - top_n_temporal           # top N species to plot (temporal_stickiness)
  - sci_threshold            # SCI threshold (migratory_classification)
  - kurtosis_threshold       # residual kurtosis threshold (migratory_classification)
  - pmr_threshold            # peak-to-median ratio threshold (migratory_classification)
  - window_size              # rolling window size in days (migratory_classification)
  - min_solar_days           # min days with >10 detections (solar_correlation)
  - max_timeseries_species   # max species to plot (daily_timeseries)
alg_type_nodes:
  - BirdNET
  - Heatmaps
  - TemporalStickiness
  - SpatialStickiness
  - MigratoryClassification
  - SolarCorrelation
  - DailyTimeseries
dataset_type_nodes:
  - AudioDataset
  - BirdnetAggregate
  - HeatmapsOutput
  - TemporalOutput
  - SpatialOutput
  - MigratoryOutput
  - SolarOutput
  - TimeseriesOutput

# ---- datasets ----
--- !Dataset_Type
id: AudioDataset
name: Registered Field Audio
description: "Root dataset: WAVs uploaded into the docker's registered audio dir."
format: File

--- !Dataset_Type
id: BirdnetAggregate
name: BirdNET Detections Aggregate
description: "Master detections CSV produced by BirdNET; consumed by all analyses."
format: File

--- !Dataset_Type
id: HeatmapsOutput
name: Activity Heatmaps
description: "Per-spot hourly activity heatmaps."
format: File

--- !Dataset_Type
id: TemporalOutput
name: Temporal Stickiness
description: "Activity-regularity correlation outputs."
format: File

--- !Dataset_Type
id: SpatialOutput
name: Spatial Stickiness
description: "Habitat-affinity correlation outputs (needs >=2 spots)."
format: File

--- !Dataset_Type
id: MigratoryOutput
name: Migratory vs Resident
description: "Migratory/resident classification outputs."
format: File

--- !Dataset_Type
id: SolarOutput
name: Solar Correlation
description: "Solar-event correlation outputs."
format: File

--- !Dataset_Type
id: TimeseriesOutput
name: Daily Call Time Series
description: "Per-species daily call-count outputs."
format: File

# ---- algorithms (edges: input_datasets -> outputs) ----
--- !Algorithm_Type
id: BirdNET
name: BirdNET
description: "Detect species in the registered audio; append to the aggregate."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: snr_db
    type: string
  - name: min_confidence
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - AudioDataset
outputs:
  - BirdnetAggregate

--- !Algorithm_Type
id: Heatmaps
name: Heatmaps
description: "Per-spot hourly activity heatmaps from the aggregate."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: top_n_species
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - HeatmapsOutput

--- !Algorithm_Type
id: TemporalStickiness
name: TemporalStickiness
description: "Consecutive-day temporal activity correlation."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: top_n_temporal
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - TemporalOutput

--- !Algorithm_Type
id: SpatialStickiness
name: SpatialStickiness
description: "Consecutive-day spatial distribution correlation (>=2 spots)."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - SpatialOutput

--- !Algorithm_Type
id: MigratoryClassification
name: MigratoryClassification
description: "Classify species migratory vs resident."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: sci_threshold
    type: string
  - name: kurtosis_threshold
    type: string
  - name: pmr_threshold
    type: string
  - name: window_size
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - MigratoryOutput

--- !Algorithm_Type
id: SolarCorrelation
name: SolarCorrelation
description: "Correlate daily peak activity with sunrise/sunset."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: min_solar_days
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - SolarOutput

--- !Algorithm_Type
id: DailyTimeseries
name: DailyTimeseries
description: "Per-species daily call-count time series."
params:
  - name: spots
    type: string
  - name: start_date
    type: string
  - name: end_date
    type: string
  - name: max_timeseries_species
    type: string
  - name: spots_geo
    type: string
input_datasets:
  - BirdnetAggregate
outputs:
  - TimeseriesOutput
