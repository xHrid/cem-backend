# STACD Dataset Repo — root datasets (pre-existing inputs not produced by any
# algorithm). For bioacoustics the only root dataset is the registered audio
# directory. It is NOT passed by Airflow: the web app uploads WAVs into the
# docker's fixed registered audio dir (POST /api/v1/datasets/audio) before the
# DAG is triggered, and BirdNET reads that dir.

--- !Dataset_Instance
type_id: AudioDataset
version: "1"
region: cem_field_sites
# Logical id of the registered audio dataset inside the docker's shared data dir:
#   <DATA_DIR>/jobs/<STACD_WORKSPACE_ID>/input/audio/
# (STACD_WORKSPACE_ID defaults to "registered".)
asset_id: "cem/bioacoustics/registered/audio"
metadata:
  source: "CEM acoustic recorders (Song Meter style WAV: SPOT_YYYYMMDD_HHMMSS.wav)"
  description: "Field audio uploaded into the docker's registered audio dir; consumed by BirdNET."
